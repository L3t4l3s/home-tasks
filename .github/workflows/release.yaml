name: Release

on:
  release:
    types: [published]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version from release tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" \
            custom_components/home_tasks/manifest.json
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*/v$VERSION/" \
            custom_components/home_tasks/home-tasks-card.js

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/home_tasks/manifest.json custom_components/home_tasks/home-tasks-card.js
          git diff --staged --quiet && exit 0
          git commit -m "Bump version to ${GITHUB_REF#refs/tags/v}"
          git push
