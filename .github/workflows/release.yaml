name: Release version check

# Runs when a release becomes a full release — the `released` event fires when
# a release is published as non-prerelease, or when a pre-release is promoted
# to "latest". Verifies the tagged manifest.json version matches the tag, as a
# guard against releases cut outside the "Prepare release" workflow.

on:
  release:
    types: [released]

jobs:
  verify-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Manifest version must match the release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="${TAG#v}"
          ACTUAL="$(jq -r .version custom_components/home_tasks/manifest.json)"
          echo "Release tag: $TAG -> expected version: $EXPECTED"
          echo "manifest.json version: $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::manifest.json version '$ACTUAL' does not match release tag '$EXPECTED'. Cut releases with the 'Prepare release' workflow so the version is bumped before tagging."
            exit 1
          fi
          echo "Version OK."
